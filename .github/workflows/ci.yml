# Test suite CI.
#
# Runs on every PR commit and on pushes to main. Also callable as a reusable
# workflow: dist-workspace.toml registers it via `plan-jobs = ["./ci"]`, so the
# cargo-dist release workflow (release.yml) invokes it as a `custom-ci` job and
# artifact builds are gated on the suite passing (see docs/plans/
# 2026-07-14-001-feat-ci-and-src-restructure-plan.md, KTD1).
#
# The GITHUB_TOKEN stays read-only even when called from release.yml (which
# grants contents: write): cargo test executes third-party build scripts, so
# the write-capable token must not be reachable from this job.
name: CI

permissions:
  contents: read

on:
  pull_request:
  push:
    branches: [main]
  # cargo-dist invokes plan-jobs workflows with no inputs; do not declare
  # a required `plan` input here.
  workflow_call:

# Cancel superseded runs on the same PR. Guarded so tag-triggered release
# invocations (unique refs) never cancel each other. Workflow-level
# concurrency is evaluated in the caller's context under workflow_call.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  test:
    name: test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Run test suite
        run: cargo test --locked
