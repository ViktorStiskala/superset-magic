[package]
name = "superset-setup"
version = "0.1.0"
edition = "2021"

[[bin]]
name = "superset-setup"
path = "src/main.rs"

[dependencies]
anyhow = "1"
globset = "0.4"
inquire = "0.9"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
supports-color = "3"
tempfile = "3"
walkdir = "2"

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
strip = true
