# cargo-dist workspace configuration
# https://opensource.axo.dev/cargo-dist/
[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# dist version this config was generated for
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# Build targets: macOS (arm + x86) + Linux (arm + x86). Windows deferred per plan Scope Boundaries.
targets = ["aarch64-apple-darwin", "aarch64-unknown-linux-gnu", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# The installers to generate for each app
installers = ["shell"]
# Unix archive format must be .tar.gz — self_update is built with archive-tar + compression-flate2 (gzip).
# cargo-dist 0.32 defaults to .tar.xz on unix; override to .tar.gz so self_update extraction succeeds.
unix-archive = ".tar.gz"
# We own the self-update path (self_update crate); do not install cargo-dist's axoupdater.
install-updater = false
# Gate releases on the test suite: run .github/workflows/ci.yml as a custom
# plan-phase job. build-local-artifacts depends on it, so red tests mean no
# artifacts are ever built (and hence nothing can be published).
plan-jobs = ["./ci"]
# Attest the per-target release archives (Sigstore/SLSA provenance via
# actions/attest). Default phase (build-local-artifacts) is deliberate:
# it signs same-job build output before it transits Actions artifact
# storage; the installer script and checksum files are NOT attested at
# this phase. Changing the phase is a security decision — see
# docs/plans/2026-07-14-002-feat-release-artifact-attestations-plan.md.
github-attestations = true
# Path that installers should place binaries in
install-path = "CARGO_HOME"

# Plain vX.Y.Z tag trigger — standalone single-package repo, no tag namespace needed.
